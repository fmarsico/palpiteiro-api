spring:
  profiles:
    default: dev
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: static/**,public/**
    livereload:
      enabled: true
  application:
    name: palpiteiro-api

  datasource:
    url: jdbc:mysql://localhost:3306/palpiteiro?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: "root"
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: palpiteiro-dev-secret-key-change-me-please-2026
  expiration-ms: 86400000
