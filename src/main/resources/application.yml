spring:
  application:
    name: palpiteiro-api

  datasource:
    url: jdbc:mysql://localhost:3306/palpiteiro?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: "root"
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
